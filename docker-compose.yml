services:
  db:
    image: postgres:16-alpine
    container_name: blackbid_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blackbid
      POSTGRES_USER: blackbid
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackbid -d blackbid"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: blackbid_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:3000"
    environment:
      DATABASE_URL: postgresql://blackbid:${DB_PASSWORD:-changeme}@db:5432/blackbid
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
