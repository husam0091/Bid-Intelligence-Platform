name: Bug Report
description: Something isn't working correctly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New Bid Wizard
        - Live Verdict Panel / Decision Logic
        - Operations Dashboard
        - CEO Dashboard
        - Bid History
        - Win Predictor
        - Analytics
        - Settings / User Management
        - AI Features (Insight / Search / Portfolio)
        - Bilingual / Arabic / RTL
        - Auth / Login
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Browser: Chrome 124
        - Language: Arabic
        - Docker version: 25.0
        - App version / commit:
    validations:
      required: false
